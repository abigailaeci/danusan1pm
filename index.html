<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danusan 1PM - Minggu 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #0f172a;
        }
        .safe-top { padding-top: max(1rem, env(safe-area-inset-top)); }
        .safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // URL GOOGLE APPS SCRIPT ANDA
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEzV0qs4O0xZ7NcyfBfYRDYppI1e7Rv5pT0Z5P6IUjHt8Mb7dJgLOjZ0Vxce7r_FMLbQ/exec";

        const MENU_DATA = [
            { id: 1, name: "Nasi Bakar", price: 15000, category: "Makanan" },
            { id: 2, name: "Nasi Kulit Geprek", price: 15000, category: "Makanan" },
            { id: 3, name: "Nasi Babi Kecap", price: 20000, category: "Makanan" },
            { id: 4, name: "Nasi Ayam Geprek", price: 15000, category: "Makanan" },
            { id: 5, name: "Nasi Sup Bunga Matahari", price: 15000, category: "Makanan" },
            { id: 6, name: "Batagor", price: 20000, category: "Makanan" },
            { id: 7, name: "Tahu Bakso", price: 4000, category: "Snack" },
            { id: 8, name: "Risoles Ragout Ayam isi 5", price: 25000, category: "Snack" },
            { id: 9, name: "Pastel isi 5", price: 25000, category: "Snack" },
            { id: 10, name: "Onde onde isi 5", price: 23000, category: "Snack" },
            { id: 11, name: "Siomay Basah", price: 7000, category: "Snack" },
            { id: 12, name: "Siomay Goreng", price: 7000, category: "Snack" },
            { id: 13, name: "Lupis Ketan Putih", price: 13000, category: "Snack" },
            { id: 14, name: "Lupis Ketan Item", price: 13000, category: "Snack" },
            { id: 15, name: "Salad Buah", price: 15000, category: "Snack" },
            { id: 16, name: "Jus Jambu", price: 10000, category: "Minuman" },
            { id: 17, name: "Jus Kedondong", price: 13000, category: "Minuman" },
            { id: 18, name: "Chocolate", price: 15000, category: "Minuman" },
            { id: 19, name: "Milk Tea", price: 15000, category: "Minuman" },
            { id: 20, name: "Peach Tea", price: 12000, category: "Minuman" },
            { id: 21, name: "Beras Kencur Kunir asem", price: 10000, category: "Minuman" },
        ];

        function App() {
            const [userName, setUserName] = useState("");
            const [isStarted, setIsStarted] = useState(false);
            const [cart, setCart] = useState({});
            const [showSummary, setShowSummary] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isStarted, showSummary]);

            const updateQuantity = (id, delta) => {
                setCart(prev => {
                    const currentQty = prev[id] || 0;
                    const newQty = Math.max(0, currentQty + delta);
                    if (newQty === 0) {
                        const { [id]: _, ...rest } = prev;
                        return rest;
                    }
                    return { ...prev, [id]: newQty };
                });
            };

            const cartItems = useMemo(() => {
                return Object.entries(cart).map(([id, qty]) => {
                    const item = MENU_DATA.find(m => m.id === parseInt(id));
                    return { ...item, qty, subtotal: item.price * qty };
                });
            }, [cart]);

            const totalPrice = cartItems.reduce((sum, item) => sum + item.subtotal, 0);
            const formatIDR = (num) => "Rp " + num.toLocaleString('id-ID');

            const sendToSpreadsheet = async () => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === "URL_SCRIPT_DEPLOY_ANDA") {
                    alert("Mohon masukkan URL Google Script Anda terlebih dahulu di bagian kode!");
                    return;
                }
                
                setIsSubmitting(true);
                const itemsPayload = {};
                cartItems.forEach(item => { itemsPayload[item.name] = item.qty; });

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            nama: userName,
                            total: totalPrice,
                            items: itemsPayload,
                            minggu: "Minggu 4"
                        })
                    });
                    alert("Berhasil! Pesanan Batch 4 sudah dicatat.");
                    setCart({});
                    setShowSummary(false);
                } catch (e) {
                    alert("Gagal mengirim data. Cek koneksi atau URL script.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (!isStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                        <div className="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-2xl space-y-8 text-center border-t-[10px] border-emerald-500 transition-all">
                            <div className="space-y-4">
                                <span className="bg-emerald-100 text-emerald-600 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.3em]">Danusan Batch 4</span>
                                <h1 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">ORDER<br/>SESEPUH</h1>
                                <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em]">Kantin 1PM - Minggu Keempat</p>
                            </div>
                            <div className="space-y-4 pt-4">
                                <input 
                                    type="text" 
                                    placeholder="Tulis namamu di sini..." 
                                    className="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-bold text-center text-slate-800 outline-none focus:border-emerald-400 transition-all placeholder:text-slate-300"
                                    value={userName}
                                    onChange={(e) => setUserName(e.target.value)}
                                />
                                <button 
                                    disabled={!userName.trim()}
                                    onClick={() => setIsStarted(true)}
                                    className="w-full py-5 bg-emerald-600 text-white font-black rounded-3xl shadow-xl shadow-emerald-900/20 disabled:opacity-30 active:scale-95 transition-all uppercase tracking-widest text-sm"
                                >
                                    Cek Menu Lezat
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen bg-slate-50 text-slate-900">
                    <header className="bg-white/90 backdrop-blur-md border-b sticky top-0 z-30 px-5 py-4 safe-top shadow-sm">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white font-black italic">4</div>
                                <div>
                                    <h1 className="text-lg font-black leading-none text-slate-800">DANUSAN <span className="text-emerald-600">1PM</span></h1>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">🛒 {userName}</p>
                                </div>
                            </div>
                            <button onClick={() => setIsStarted(false)} className="text-slate-300 hover:text-red-500 transition-colors">
                                <i data-lucide="log-out" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow max-w-2xl mx-auto w-full p-4 space-y-12 pb-44">
                        {["Makanan", "Snack", "Minuman"].map(category => (
                            <div key={category} className="space-y-5">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <div className="w-1.5 h-6 bg-emerald-500 rounded-full"></div>
                                        <h2 className="text-[12px] font-black text-slate-400 uppercase tracking-[0.3em]">{category}</h2>
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-300">{MENU_DATA.filter(i => i.category === category).length} Pilihan</span>
                                </div>
                                
                                <div className="grid gap-4">
                                    {MENU_DATA.filter(i => i.category === category).map((item) => (
                                        <div key={item.id} className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm flex justify-between items-center group transition-all hover:shadow-md active:bg-emerald-50/30">
                                            <div className="flex-1 pr-4">
                                                <h3 className="font-bold text-slate-800 text-sm leading-tight">{item.name}</h3>
                                                <p className="text-[11px] font-black text-emerald-600 mt-1">{formatIDR(item.price)}</p>
                                            </div>
                                            <div className="flex items-center">
                                                {cart[item.id] > 0 ? (
                                                    <div className="flex items-center bg-slate-900 rounded-2xl p-1 shadow-lg overflow-hidden transition-all scale-105">
                                                        <button onClick={() => updateQuantity(item.id, -1)} className="w-9 h-9 flex items-center justify-center text-white/50 hover:text-white transition-colors"><i data-lucide="minus" className="w-4 h-4"></i></button>
                                                        <span className="w-8 text-center font-black text-white text-xs">{cart[item.id]}</span>
                                                        <button onClick={() => updateQuantity(item.id, 1)} className="w-9 h-9 flex items-center justify-center bg-emerald-500 text-white rounded-xl"><i data-lucide="plus" className="w-4 h-4"></i></button>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => updateQuantity(item.id, 1)} className="bg-emerald-50 text-emerald-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-emerald-100 hover:bg-emerald-600 hover:text-white transition-all shadow-sm">Pilih</button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>

                    {totalPrice > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 p-5 bg-white/95 backdrop-blur-2xl border-t z-40 safe-bottom shadow-[0_-20px_40px_-15px_rgba(0,0,0,0.1)]">
                            <div className="max-w-2xl mx-auto flex items-center justify-between gap-6">
                                <div className="flex flex-col">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1.5">Total Bayar</span>
                                    <span className="text-2xl font-black text-slate-900 tracking-tighter">{formatIDR(totalPrice)}</span>
                                </div>
                                <button onClick={() => setShowSummary(true)} className="flex-1 bg-emerald-600 text-white h-16 rounded-3xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-emerald-200 active:scale-95 transition-all flex items-center justify-center gap-3">
                                    <span>Konfirmasi</span>
                                    <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    {showSummary && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
                            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onClick={() => !isSubmitting && setShowSummary(false)} />
                            <div className="relative bg-white w-full max-w-md rounded-[3rem] overflow-hidden flex flex-col max-h-[85vh] shadow-2xl border-t-8 border-emerald-500 animate-in fade-in zoom-in duration-200">
                                <div className="p-8 text-center border-b bg-slate-50/50">
                                    <div className="w-16 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
                                    <h2 className="text-xl font-black uppercase tracking-tighter text-slate-800">Cek Pesananmu</h2>
                                    <p className="text-[10px] font-black text-emerald-600 mt-1 uppercase tracking-widest leading-relaxed">Minggu 4 • Order ID #1PM-M4</p>
                                </div>
                                
                                <div className="p-8 space-y-6 overflow-y-auto flex-grow custom-scrollbar">
                                    {cartItems.map((item) => (
                                        <div key={item.id} className="flex justify-between items-center animate-in slide-in-from-bottom-2">
                                            <div className="flex flex-col">
                                                <span className="font-bold text-slate-800 text-sm leading-tight">{item.name}</span>
                                                <span className="text-[10px] text-slate-400 font-black mt-1 uppercase tracking-wider">{item.qty} Porsi x {formatIDR(item.price)}</span>
                                            </div>
                                            <span className="font-black text-slate-900 text-sm">{formatIDR(item.subtotal)}</span>
                                        </div>
                                    ))}
                                    
                                    <div className="mt-8 p-6 bg-emerald-600 rounded-[2rem] flex justify-between items-center shadow-lg shadow-emerald-200">
                                        <div className="flex flex-col">
                                            <span className="font-black text-white/60 text-[9px] uppercase tracking-widest leading-none mb-1">Total Akhir</span>
                                            <span className="text-2xl font-black text-white">{formatIDR(totalPrice)}</span>
                                        </div>
                                        <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-white">
                                            <i data-lucide="receipt" className="w-5 h-5"></i>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-8 pt-0 space-y-3">
                                    <button onClick={sendToSpreadsheet} disabled={isSubmitting} className="w-full py-5 bg-slate-900 text-white font-black rounded-3xl text-xs uppercase tracking-[0.2em] active:scale-95 transition-all shadow-xl flex items-center justify-center gap-2">
                                        {isSubmitting ? (
                                            <>
                                                <div className="w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                                                <span>Memproses...</span>
                                            </>
                                        ) : (
                                            "Kirim Pesanan Sekarang"
                                        )}
                                    </button>
                                    <button onClick={() => setShowSummary(false)} className="w-full py-3 text-slate-400 font-bold text-[10px] uppercase tracking-widest hover:text-slate-600">Batal / Ubah</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
