<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danusan 1PM - Minggu 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-top { padding-top: max(1rem, env(safe-area-inset-top)); }
        .safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        .soft-shadow { shadow-sm hover:shadow-md transition-shadow duration-200; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // MASUKKAN URL GOOGLE APPS SCRIPT BARU ANDA DI SINI
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAsV4WnmwKm4GeVZCRF7qDHCOPBXQwVW9WowhN8rZbtYM-W0g-rRQYjAVIGJosPzzr2A/exec";

        const MENU_DATA = [
            // MAKANAN UTAMA
            { id: 1, name: "Nasi Bakar", price: 15000, category: "Makanan" },
            { id: 2, name: "Nasi Kebuli", price: 15000, category: "Makanan" },
            { id: 3, name: "Nasi Babi Rica", price: 20000, category: "Makanan" },
            { id: 4, name: "Nasi Ayam Geprek", price: 15000, category: "Makanan" },
            { id: 5, name: "Tahu Gimbal Telur", price: 25000, category: "Makanan" },
            { id: 6, name: "Batagor", price: 20000, category: "Makanan" },
            
            // SNACK
            { id: 7, name: "Tahu Bakso", price: 4000, category: "Snack" },
            { id: 8, name: "Risoles Ragout Ayam isi 5", price: 25000, category: "Snack" },
            { id: 9, name: "Pastel isi 5", price: 25000, category: "Snack" },
            { id: 10, name: "Onde - onde isi 5", price: 20000, category: "Snack" },
            { id: 11, name: "Siomay Basah", price: 7000, category: "Snack" },
            { id: 12, name: "Siomay Goreng", price: 7000, category: "Snack" },
            { id: 13, name: "Lupis Ketan Putih", price: 13000, category: "Snack" },
            { id: 14, name: "Lupis Ketan Item", price: 13000, category: "Snack" },
            { id: 15, name: "Aneka Gorengan isi 4", price: 10000, category: "Snack" },
            
            // MINUMAN
            { id: 16, name: "Jus Jambu", price: 10000, category: "Minuman" },
            { id: 17, name: "Jus Kedondong", price: 13000, category: "Minuman" },
            { id: 18, name: "Chocolate", price: 15000, category: "Minuman" },
            { id: 19, name: "Matcha", price: 15000, category: "Minuman" },
            { id: 20, name: "Milk Tea", price: 15000, category: "Minuman" },
        ];

        function App() {
            const [userName, setUserName] = useState("");
            const [isStarted, setIsStarted] = useState(false);
            const [cart, setCart] = useState({});
            const [showSummary, setShowSummary] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isStarted, showSummary]);

            const updateQuantity = (id, delta) => {
                setCart(prev => {
                    const currentQty = prev[id] || 0;
                    const newQty = Math.max(0, currentQty + delta);
                    if (newQty === 0) {
                        const { [id]: _, ...rest } = prev;
                        return rest;
                    }
                    return { ...prev, [id]: newQty };
                });
            };

            const cartItems = useMemo(() => {
                return Object.entries(cart).map(([id, qty]) => {
                    const item = MENU_DATA.find(m => m.id === parseInt(id));
                    return { ...item, qty, subtotal: item.price * qty };
                });
            }, [cart]);

            const totalPrice = cartItems.reduce((sum, item) => sum + item.subtotal, 0);

            const formatIDR = (num) => "Rp " + num.toLocaleString('id-ID');

            const sendToSpreadsheet = async () => {
                setIsSubmitting(true);
                const itemsPayload = {};
                cartItems.forEach(item => { itemsPayload[item.name] = item.qty; });

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            nama: userName,
                            total: totalPrice,
                            items: itemsPayload,
                            minggu: "Minggu 3"
                        })
                    });
                    alert("Pesanan Minggu 3 Berhasil Dikirim!");
                    setCart({});
                    setShowSummary(false);
                } catch (e) {
                    alert("Gagal mengirim pesanan.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (!isStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-2xl space-y-8 text-center border-t-[10px] border-orange-500">
                            <div>
                                <span className="bg-orange-100 text-orange-600 px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.3em]">Batch 3</span>
                                <h1 className="text-4xl font-black text-slate-800 tracking-tighter mt-6">DANUSAN 1PM</h1>
                                <p className="text-slate-400 font-bold text-xs mt-2 uppercase tracking-widest leading-loose">Pemesanan Minggu 3</p>
                            </div>
                            <input 
                                type="text" 
                                placeholder="Tulis Nama Anda..." 
                                className="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-bold text-slate-800 outline-none focus:border-orange-400 focus:bg-white text-center transition-all"
                                value={userName}
                                onChange={(e) => setUserName(e.target.value)}
                            />
                            <button 
                                disabled={!userName.trim()}
                                onClick={() => setIsStarted(true)}
                                className="w-full py-5 bg-orange-600 text-white font-black rounded-3xl shadow-xl shadow-orange-900/20 disabled:opacity-30 active:scale-95 transition-all uppercase tracking-widest text-sm"
                            >
                                Mulai Pesan
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen bg-slate-50">
                    <header className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-30 p-5 safe-top">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-black text-slate-800">DANUSAN <span className="text-orange-600">1PM</span></h1>
                                <p className="text-[10px] font-black text-slate-400 uppercase mt-0.5 tracking-widest">🛒 Pembeli: {userName}</p>
                            </div>
                            <div className="bg-slate-900 text-white text-[10px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest">M-3</div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-2xl mx-auto w-full p-4 space-y-10 pb-44">
                        {["Makanan", "Snack", "Minuman"].map(category => (
                            <div key={category} className="space-y-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-2 h-5 bg-orange-500 rounded-full"></div>
                                    <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em]">{category}</h2>
                                </div>
                                <div className="grid gap-3">
                                    {MENU_DATA.filter(i => i.category === category).map((item) => (
                                        <div key={item.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center transition-all">
                                            <div className="flex-1 pr-4">
                                                <h3 className="font-bold text-slate-800 text-sm leading-snug">{item.name}</h3>
                                                <p className="text-xs font-black text-orange-500 mt-1">{formatIDR(item.price)}</p>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {cart[item.id] > 0 ? (
                                                    <div className="flex items-center bg-slate-100 rounded-2xl p-1.5">
                                                        <button onClick={() => updateQuantity(item.id, -1)} className="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-slate-400 shadow-sm"><i data-lucide="minus" className="w-4 h-4"></i></button>
                                                        <span className="w-10 text-center font-black text-slate-800">{cart[item.id]}</span>
                                                        <button onClick={() => updateQuantity(item.id, 1)} className="w-9 h-9 flex items-center justify-center bg-slate-900 rounded-xl text-white shadow-lg"><i data-lucide="plus" className="w-4 h-4"></i></button>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => updateQuantity(item.id, 1)} className="bg-slate-50 text-slate-400 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-slate-100 hover:bg-slate-100 transition-all">Pilih</button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>

                    {totalPrice > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 p-5 bg-white/90 backdrop-blur-xl border-t z-40 safe-bottom">
                            <div className="max-w-2xl mx-auto flex items-center justify-between gap-6">
                                <div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Total Minggu 3</p>
                                    <p className="text-2xl font-black text-slate-900">{formatIDR(totalPrice)}</p>
                                </div>
                                <button onClick={() => setShowSummary(true)} className="flex-1 bg-orange-600 text-white py-5 rounded-3xl font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-orange-200 active:scale-95 transition-all">Selesaikan Pesanan</button>
                            </div>
                        </div>
                    )}

                    {showSummary && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={() => !isSubmitting && setShowSummary(false)} />
                            <div className="relative bg-white w-full max-w-md rounded-[3rem] overflow-hidden flex flex-col max-h-[85vh] shadow-2xl border-t-8 border-slate-900">
                                <div className="p-8 text-center border-b bg-slate-50">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">Konfirmasi Rekapan</h2>
                                    <p className="text-xs font-bold text-orange-600 mt-1 uppercase tracking-widest">Minggu 3 • {userName}</p>
                                </div>
                                <div className="p-8 space-y-5 overflow-y-auto flex-grow">
                                    {cartItems.map((item) => (
                                        <div key={item.id} className="flex justify-between items-start border-b border-slate-50 pb-4 last:border-0">
                                            <div className="flex flex-col">
                                                <span className="font-bold text-slate-800 text-sm">{item.name}</span>
                                                <span className="text-[10px] text-slate-400 font-black mt-1 uppercase tracking-widest">{item.qty} Porsi x {formatIDR(item.price)}</span>
                                            </div>
                                            <span className="font-black text-slate-900 text-sm">{formatIDR(item.subtotal)}</span>
                                        </div>
                                    ))}
                                    <div className="p-6 bg-orange-50 border-2 border-dashed border-orange-200 rounded-[2rem] flex justify-between items-center mt-6">
                                        <span className="font-black text-slate-400 text-[10px] uppercase tracking-widest">Total Bayar</span>
                                        <span className="text-2xl font-black text-orange-600">{formatIDR(totalPrice)}</span>
                                    </div>
                                </div>
                                <div className="p-8 pt-2 space-y-4">
                                    <button onClick={() => setShowSummary(false)} className="w-full py-4 bg-white border-2 border-slate-100 text-slate-400 font-black rounded-2xl text-[10px] uppercase tracking-widest">Ubah Pesanan</button>
                                    <button onClick={sendToSpreadsheet} disabled={isSubmitting} className="w-full py-5 bg-slate-900 text-white font-black rounded-2xl text-xs uppercase tracking-[0.2em] active:scale-95 transition-all flex justify-center items-center gap-2">
                                        {isSubmitting ? "Mengirim..." : "Kirim Pesanan Sekarang"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
